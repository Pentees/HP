                <h2 style="font-weight: 100;">Table関係</h2>
                <div style="padding-left: 10px;">
                    全然扱わないから、新しく作るときに忘れがち<br>
                    タグの上位順からtable＞tr(row)＞th(header)＞td(data)<br>
                    th、tdのborderの結合はborder-collapseでcollapseを選択、sepalateは標準状態
                </div>
                <br>

                <div style="padding-left: 10px;">
                    Wordにあるショートカットにないヤツ中心<br>
                    打ち消し線(Strike-Through)<br>
                    正式名称長すぎ<br>
                    htmlのみでの実装：sタグ、deleteタグ、strikeタブ(HTML5で非推奨化)<br>
                    cssでの実装：text-decorationでline-throughを選択<br>
                    <br>
                </div>
