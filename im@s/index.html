    <script>
        const sleep = (time) => new Promise((resolve) => setTimeout(resolve, time));

        console.info(navigator)

        function isSmartPhone()
        {
            if (navigator.userAgent.match(/iPhone|Android.+Mobile/)) {
                return true;
            } else {
                return false;
            }
        }
        const isTouchable = "ontouchstart" in window || (window.DocumentTouch && document instanceof DocumentTouch);
        var event_touch_click = null
        if(isTouchable)
        {
            event_touch_click = "touchend"
        }
        else
        {
            event_touch_click = "click"
        }

        async function main()
        {
            const res_lang = await fetch("/HP/im@s/resource/lang.json",{ cache: "no-cache" })
            const resource = await res_lang.json()
            const res_ids = await fetch("/HP/im@s/resource/game_id.json",{ cache: "no-cache" })
            const ids = await res_ids.json()
            const res_idol = await fetch("/HP/im@s/resource/idols.json",{ cache: "no-cache" })
            const idol = await res_idol.json()
            var options,idol_content=""
            for(i = 0; i < resource["language"].length; i++)
            {
                console.info(resource["language"][i], resource["name"][i])
                options += "<option value=" + resource["language"][i] + ">" + resource["name"][i] + "</option>"
            }

            document.getElementById("lang").innerHTML = options
            const defaults = await resource["language"][0]

            document.getElementById("title").innerHTML = await resource[defaults]["name"]
            document.getElementById("about_me_title").innerHTML = await resource[defaults]["about_title_prefics"] + resource[defaults]["name"] + resource[defaults]["about_title_sufics"]
            document.getElementById("about_me").innerHTML = await resource[defaults]["describe"]
            
            for(i = 0; i < resource["idols"].length; i++)
            {
                idol_name = resource["idols"][i]
                idol_content += "<div class=\"idol-card " + idol[idol_name]["production_group"] + "\" id=\"" + idol_name + "\" style=\" border-color:"+ idol[idol_name]["color"] +"\">\n";
                idol_content += "<h3 id=\"" + idol_name + "_Name\" class=\"idol_name\">"+ resource[defaults]["idols"]["body"][idol_name] +"</h4>\n";
                idol_content += "<p id=\"" + idol_name + "_Group\" style=\"color:"+ resource["color"][idol[idol_name]["production_group"]] +"\">"+ resource[defaults]["Group"][idol[idol_name]["production_group"]] +"</p>\n";
                idol_content += "</div>\n";
            }
            document.getElementById("idols_title").innerHTML = await resource[defaults]["idols"]["head"]
            document.getElementById("idols").innerHTML = idol_content

            for(i = 0;i < await ids["elements"].length;i++)
            {
                game_name_id = await ids["elements"][i]
                document.getElementById(ids["elements"][i] + "_name").innerHTML = await resource[defaults]["Game_Name"][ids["elements"][i]]
                document.getElementById(ids["elements"][i] + "_id").innerHTML = "ID: " + ids[ids["defines"][game_name_id]]
                if(isSmartPhone() == true)
                {
                    document.getElementById("Copy_"+ids["elements"][i]).innerHTML = await resource[defaults]["Tap_to_Copy"]
                }
                else
                {
                    document.getElementById("Copy_"+ids["elements"][i]).innerHTML = await resource[defaults]["Click_to_Copy"]
                }
            }
            var idol_content = "";

            document.title = await resource[defaults]["title_prefics"] + await resource[defaults]["name"] + await resource[defaults]["title_sufics"]
            document.getElementById("title").innerHTML = document.title
        }

        async function copyid(game_name)
        {
            const res_ids = await fetch("/HP/im@s/resource/game_id.json",{ cache: "no-cache" })
            const res_lang = await fetch("/HP/im@s/resource/lang.json",{ cache: "no-cache" })
            const ids = await res_ids.json()
            const lang_json = await res_lang.json()
            game_json_name = await ids["defines"][game_name]
            game_id = await ids[game_json_name]
            const lang = document.getElementById("lang").value
            console.log(await ids[game_json_name])
            navigator.clipboard.writeText(await ids[game_json_name])
            document.getElementById("Copy_"+game_name).innerHTML = await lang_json[lang]["Copy_Success"]
            await sleep(1500)
            if(isSmartPhone() == true)
            {
                document.getElementById("Copy_"+game_name).innerHTML = await lang_json[lang]["Tap_to_Copy"]
            }
            else
            {
                document.getElementById("Copy_"+game_name).innerHTML = await lang_json[lang]["Click_to_Copy"]
            }
        }

        async function lang_change()
        {
            const lang = document.getElementById("lang").value
            const res = await fetch("/HP/im@s/resource/lang.json",{ cache: "no-cache"})
            const resource = await res.json()
            const res_ids = await fetch("/HP/im@s/resource/game_id.json",{ cache: "no-cache" })
            const ids = await res_ids.json()
            const res_idol = await fetch("/HP/im@s/resource/idols.json",{ cache: "no-cache" })
            const idol = await res_idol.json()

            document.getElementById("about_me").innerHTML = await resource[lang]["describe"]
            document.getElementById("about_me_title").innerHTML = await resource[lang]["about_title_prefics"] + await resource[lang]["name"] + await resource[lang]["about_title_sufics"]

            
            
            document.getElementById("idols_title").innerHTML = await resource[lang]["idols"]["head"]
            for(i = 0; i < resource["idols"].length; i++)
            {
                idol_name = resource["idols"][i]
                idol_group = idol[idol_name]["production_group"]
                document.getElementById(idol_name+"_Name").innerHTML = await resource[lang]["idols"]["body"][idol_name]
                document.getElementById(idol_name+"_Group").innerHTML = await resource[lang]["Group"][idol_group]
            }
            for(i = 0;i < await ids["elements"].length;i++)
            {
                var game_name = await ids["elements"][i]
                document.getElementById(game_name+"_name").innerHTML = await resource[lang]["Game_Name"][game_name]
                if(isSmartPhone() == true)
                {
                    document.getElementById("Copy_"+game_name).innerHTML = await resource[lang]["Tap_to_Copy"]
                }
                else
                {
                    document.getElementById("Copy_"+game_name).innerHTML = await resource[lang]["Click_to_Copy"]
                }
            }
            for(i = 0;i < await resource["SNS"].length;i++)
            {
                document.getElementById("describe_"+resource["SNS"][i]).innerHTML = await resource[lang]["SNS_describe"][resource["SNS"][i]]
                document.getElementById(resource["SNS"][i]).innerHTML = await resource[lang]["SNS_Name"][await resource["SNS"][i]]
            }
            document.getElementById("game_ids_index").innerHTML = await resource[lang]["game_ids"]
            document.title = await resource[lang]["title_prefics"] + await resource[lang]["name"] + await resource[lang]["title_sufics"]
            document.getElementById("title").innerHTML = document.title
        }

        main()
        console.log(event_touch_click)
        document.querySelector("#CGSS").addEventListener(event_touch_click, () =>
        {
            copyid('CGSS')         
        });
        document.querySelector("#MLTD").addEventListener(event_touch_click, () =>
        {
            copyid('MLTD')         
        });
        document.querySelector("#SCSP").addEventListener(event_touch_click, () =>
        {
            copyid('SCSP')         
        });
        document.querySelector("#GK").addEventListener(event_touch_click, () =>
        {
            copyid('GK')         
        });
    </script>
    <script>
        function clock_JST()
        {
            let nowTime = new Date();
            let nowMonth  = nowTime.getMonth() + 1;
            let nowDate  = nowTime.getDate();
            let nowHour = nowTime.getHours() + (9 + Math.floor(nowTime.getTimezoneOffset()/60));
            let nowMin  = nowTime.getMinutes() + nowTime.getTimezoneOffset() % 60;
            let nowSec  = nowTime.getSeconds();
            nowMin = nowMin.toString().padStart(2,"0")
            nowSec = nowSec.toString().padStart(2,"0")
            let msg = nowMonth + "/" + nowDate + " " + nowHour + ":" + nowMin + ":" + nowSec + " now (JST)";
            document.getElementById("JST").innerHTML = msg;
            return [nowMonth, nowDate, nowHour, nowMin, nowSec]
        }
        setInterval(clock_JST, 1000);
    </script>
</html>
