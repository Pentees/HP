<!DOCTYPE html>

<html>
    <head>
        <title>魔境へようこそ</title>
        <link rel="stylesheet" href="/HP/resource/common.css">
        <link rel="icon" href="/HP/resource/favicon.png">
        <link rel="stylesheet" href="resource/menu_sub.css">
        <script src="resource/fetch.js"></script>
        <script src="resource/time_zone.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@latest"></script>
        <style>
            a#blog
            {
                background-color: aquamarine;
                border: solid 1px grey;
                border-top: 0px;
            }
        </style>
    </head>
    <body translate="no">
        <div id="menu" style="display: inline;"></div>
        <div id="menu_sub" style="display: inline;"></div>
        <div id="main_content">
            <h1>日記帳と雑記</h1>
            <div style="padding-top: 10px; padding-left: 10px;" id="main">
            </div>
        </div>
        <div id="footer" style="display: inline;"></div>
    </body>
    <script>
        Client = supabase.createClient("https://pnphgrrdxktvklvvttgy.supabase.co", "sb_publishable_Pzfhf6ual5l3CMxwESMEbg_h1CxdoeU");

        async function main()
        {
            var lang = null;
            const res = await fetch("/HP/resource/resource.json")
            const multilang = await res.json()
            if(navigator.language.length < 4)
            {
                
                lang = multilang["def"][navigator.language]
            }
            for(i = 0; i < await multilang["language"].length; i++)
            {
                if(navigator.language == await multilang["language"][i])
                {
                    lang = multilang["language"][i]
                    break;
                }
            }
            if(lang == null)
            {   
                lang = await multilang["Others"]
            }
            let url = new URL(window.location.href);
            var id = ""
            let params = url.searchParams;
            params.forEach(
                function(value,key)
                {
                    var type;
                    if(key == "id")
                    {
                        id = value
                    }
                });
            console.log(id)
            const response = await Client.from("Articles").select("*, Titles(created_at, language)").eq("id", id)
            console.log(await response)
            const set_Contents = await response["data"][0]
            console.log(await set_Contents)
            if(await set_Contents["title"] != "")
            {
                title_blog = await set_Contents["title"]
            }
            else
            {
                title_blog = multilang[lang]["untitled"]
            }
            if(await set_Contents["contents"] != "")
            {
                content = await set_Contents["contents"]
            }
            else
            {
                content = multilang[lang]["untexted"]
            }
            console.log(lang, set_Contents["Titles"]["language"])
            if( lang != await set_Contents["Titles"]["language"])
            {
                content = "<span style=\"color:orange\">"+ multilang[lang]["caution"] +":" + multilang[lang]["other_language_notice"] + "</span><br>" + content
            }
            document.title = await title_blog + "-pptx2061"
            title_blog +=  "<br>" + Conv_UTC(await set_Contents["Titles"]["created_at"])
            const Contents_Set = await title_blog + "<br>" + await content
            document.getElementById("main").innerHTML = await Contents_Set;
            document.getElementById("main").setAttribute("Lang", set_Contents["Titles"]["language"])
            document.getElementById("main").setAttribute("translate", "yes")
        }

        main();
    </script>
</html>
