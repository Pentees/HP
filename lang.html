<!DOCTYPE html>

<html lang="Unknown">
    <head>
        <meta charset="UTF-8">
        <title>Change Lang</title>
        <link rel="stylesheet" href="./style/lang.css">
        <style>
        #message
        {
            opacity: 0;
            &.is-active
            {
                opacity: 1;  
            }
        }
        </style>
        <script>
            fetch("./footer.html")
              .then((response) => response.text())
              .then((data) => document.querySelector("#footer").innerHTML = data);
          </script>
    </head>
    <body>
        <div id="menu" style="display: inline;"></div>
        <div style="margin-left:15px;">
            <h1>Change Language</h1> 
            <h3 style="font-weight: 300;">
                <ul>
                <li><a href="./ja-JP/">日本語 - Japanese</a></li>   
                </ul>
            </h3>
            </div>
        </div>
        <div id="footer" style="display: inline;"></div>
    </body>
</html>
